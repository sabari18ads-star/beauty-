<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beauty Parlor</title>
    <style>
        /* அடிப்படை ஸ்டைல்கள் */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #fff5f8;
            color: #333;
        }

        /* Navigation Bar */
        nav {
            background-color: #ff4d94;
            padding: 15px;
            display: flex;
            justify-content: space-around;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        nav a {
            color: white;
            text-decoration: none;
            font-weight: bold;
            font-size: 18px;
        }

        /* Hero Section */
        .hero {
            text-align: center;
            padding: 50px 20px;
            background: linear-gradient(rgba(255, 77, 148, 0.1), rgba(255, 77, 148, 0.1));
        }

        .hero h1 {
            font-size: 2.5rem;
            color: #d10056;
        }

        /* Services Section (Grid Layout) */
        .services-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            padding: 40px;
        }

        .service-card {
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            text-align: center;
            transition: transform 0.3s;
        }

        .service-card:hover {
            transform: translateY(-10px);
        }

        .service-card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }

        .service-card h3 {
            padding: 15px;
            color: #ff4d94;
        }

        /* Address Section */
        .address {
            background-color: #333;
            color: white;
            padding: 40px;
            text-align: center;
        }

        /* Mobile Responsive */
        @media (max-width: 600px) {
            nav {
                flex-direction: column;
                align-items: center;
                gap: 10px;
            }
            .hero h1 {
                font-size: 1.8rem;
            }
        }
    </style>
</head>
<body>

    <nav>
        <a href="#home">Home</a>
        <a href="#services">Services</a>
        <a href="#contact">Contact</a>
    </nav>

    <div class="hero" id="home">
        <h1>Your Beauty, Our Passion</h1>
        <p>we offer top-notch beauty services.</p>
    </div>

    <h2 style="text-align: center; color: #ff4d94;">Our Services</h2>
    <div class="services-container" id="services">
        
        <div class="service-card">
            <img src="image\Facial.jpg" alt="Facial">
            <h3>Facial</h3>
        </div>

        <div class="service-card">
            <img src="image\Pedicure.jpg" alt="Pedicure">
            <h3>Pedicure</h3>
        </div>

        <div class="service-card">
            <img src="image\Manicure.jpg" alt="Manicure">
            <h3>Manicure</h3>
        </div>

        <div class="service-card">
            <img src="image\Eyebrow.jpg" alt="Eyebrow">
            <h3>Eyebrow</h3>
        </div>

    </div>

    <div class="address" id="contact">
        <h2>Contact Us</h2>
        <p>Shop Name: Sai Janani Beauty Parlor<</p>
        <p>Location/Address: Hariyar Nagar, Irumbedu, Arni, Tiruvannamalai District, Tamil Nadu.</p>
        <p>Mobile Number: 9629400959</p>
    </div>

</body>
</html>
